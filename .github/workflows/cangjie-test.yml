name: Cangjie Unit Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: wolish/code-server-dev-cangjie:1.0.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Cangjie environment
        run: |
          cjc -v
          cjpm --version || true

      - name: Run Cangjie unit tests
        run: |
          cjpm test