name: Cangjie Unit Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -type f

      - name: Run Cangjie unit tests
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace zxilly/cangjie:1.0.5 cjpm test